name: Validate Build and Create Release

on:
  push:
    branches:
      - main

permissions: read-all

jobs:
  build:
    name: Build linux/${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install Podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman

    - name: Build image
      run: make build ARCH=${{ matrix.arch }}

    - name: Validate image
      run: podman image inspect localhost/tank-os:latest

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Harden runner
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Check release token
      id: check_release_token
      env:
        FG_PAT: ${{ secrets.FG_PAT }}
      run: |
        if [ -n "$FG_PAT" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "FG_PAT is not set; skipping semantic release."
        fi

    - name: Checkout repository
      if: ${{ steps.check_release_token.outputs.available == 'true' }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        token: ${{ secrets.FG_PAT }}

    - name: Python Semantic Release
      if: ${{ steps.check_release_token.outputs.available == 'true' }}
      id: release
      uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
      with:
        github_token: ${{ secrets.FG_PAT }}
